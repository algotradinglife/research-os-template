$schema: https://json-schema.org/draft/2020-12/schema
$id: https://research-os.dev/schemas/v0.1/project.schema.yaml
title: Research OS Project
type: object
required: [api_version, kind, research_os, metadata, spec]
properties:
  api_version:
    const: research-os/v0.1
  kind:
    const: Project
  research_os:
    type: object
    required: [repository, ref, controller]
    properties:
      repository:
        type: string
      ref:
        type: string
      controller:
        type: string
  metadata:
    type: object
    required: [id, name, version]
    properties:
      id:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
      name:
        type: string
      version:
        type: string
      owner:
        type: string
  spec:
    type: object
    required: [domain, objectives, evaluation, policies]
    properties:
      domain:
        type: object
        required: [name, entities]
      objectives:
        type: object
        required: [mission, research_questions]
      programs:
        type: array
        items:
          type: string
      capabilities:
        type: object
      knowledge:
        type: object
      evaluation:
        type: object
        required: [success_metrics, validation_rules]
      policies:
        type: object
